<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>LIEDAR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0f1623; --surface2:#162030;
  --border:#1c2d42; --border2:#243552;
  --text:#e2e8f0; --muted:#4a6080; --muted2:#7a98b8; --accent:#3b82f6;
  --safe:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --font:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:-webkit-fill-available;}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  background:var(--bg);color:var(--text);font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 40px;overflow-x:hidden;
}

/* ── TOPBAR ── */
.topbar{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:20;
}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.5px;color:var(--text);}
.logo em{color:var(--accent);font-style:normal;}
.logo-svg{display:flex;align-items:center;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.lang-toggle{display:flex;border-radius:20px;border:1px solid var(--border2);overflow:hidden;background:var(--bg);}
.lang-btn{padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s;font-family:var(--font);}
.lang-btn.active{background:var(--accent);color:white;}
.status-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all 0.3s;}
.sdot.live{background:var(--safe);box-shadow:0 0 6px var(--safe);animation:blink 1.4s infinite;}
.sdot.calib{background:var(--warn);box-shadow:0 0 6px var(--warn);animation:blink 0.8s infinite;}

/* ── SCORE ARC ── */
.score-wrap{
  width:100%;max-width:460px;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 18px 0;
}
.score-wrap.hidden-live{opacity:0;pointer-events:none;height:0;padding:0;overflow:hidden;}
.arc-container{position:relative;width:180px;height:100px;}
#arcSvg{overflow:visible;}
.arc-center{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;
}
.arc-num{font-size:36px;font-weight:700;font-family:var(--mono);letter-spacing:-2px;color:var(--muted);transition:color 0.4s;line-height:1;}
.arc-num.live{color:var(--cc,var(--safe));}
.arc-lbl{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:1px;transition:color 0.4s;}
.arc-lbl.live{color:var(--cc,var(--safe));}
.calib-tag{margin-top:8px;padding:4px 12px;border-radius:20px;background:#f59e0b12;border:1px solid #f59e0b35;color:var(--warn);font-size:11px;font-weight:500;letter-spacing:1px;display:none;}
.calib-tag.show{display:block;}

/* ── ALERT ── */
.alert{
  width:calc(100% - 36px);max-width:424px;margin:12px 0 0;
  padding:9px 12px;border-radius:8px;
  background:#ef444412;border:1px solid #ef444445;
  color:#fca5a5;font-size:12px;font-weight:500;
  display:none;align-items:center;gap:7px;
  animation:fadeDown 0.25s ease;
}
.alert.show{display:flex;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

/* ── EQ BARS SECTION ── */
.eq-section{
  width:calc(100% - 36px);max-width:424px;
  margin-top:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px 14px 12px;
}
.eq-section-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.eq-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;align-items:end;}
.eq-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.eq-bar-wrap{
  width:100%;height:100px;
  background:var(--bg);border-radius:6px;
  border:1px solid var(--border);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.eq-bar-fill{
  width:100%;border-radius:4px 4px 0 0;
  transition:height 0.25s ease, background 0.3s;
  min-height:3px;
}
/* danger flash */
@keyframes dangerFlash{
  0%,100%{box-shadow:none;}
  25%,75%{box-shadow:0 0 12px var(--danger) inset, 0 0 6px var(--danger);}
}
.eq-bar-wrap.alert-flash{
  border-color:var(--danger)!important;
  animation:dangerFlash 0.6s ease 3;
}
/* threshold line */
.eq-threshold{
  position:absolute;width:100%;height:1px;
  background:rgba(239,68,68,0.4);
  pointer-events:none;
}
.eq-label{font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.2;}
.eq-value{font-size:10px;font-family:var(--mono);color:var(--muted2);text-align:center;min-height:13px;}

/* ── MARK BUTTON ── */
.mark-wrap{width:calc(100% - 36px);max-width:424px;margin-top:10px;}
.mark-btn{
  width:100%;padding:10px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--muted2);font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all 0.15s;
}
.mark-btn:active{transform:scale(0.98);}
.mark-btn:disabled{opacity:0.3;cursor:default;}
.mark-cnt{background:var(--accent);color:white;font-size:10px;font-weight:700;font-family:var(--mono);padding:1px 6px;border-radius:10px;display:none;}
.mark-cnt.show{display:inline;}

/* ── HISTORY ── */
.hist-section{width:calc(100% - 36px);max-width:424px;margin-top:12px;}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sec-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
#histCanvas{width:100%;height:55px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:block;}

/* ── SUMMARY PANEL ── */
.summary{
  width:calc(100% - 36px);max-width:424px;margin-top:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px;display:none;
}
.summary.show{display:block;}
.sum-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

/* verdict */
.verdict-box{
  border-radius:10px;padding:14px;margin-bottom:14px;text-align:center;
  border:1px solid;
}
.verdict-score{font-size:40px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-2px;}
.verdict-label{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.verdict-desc{font-size:12px;color:var(--muted2);margin-top:6px;line-height:1.5;}

/* metric breakdown */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sum-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.sum-card-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.sum-card-val{font-size:15px;font-weight:600;font-family:var(--mono);}
.sum-card-note{font-size:10px;color:var(--muted);margin-top:2px;}

.sum-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.sum-row:last-of-type{border-bottom:none;}
.sum-key{font-size:12px;color:var(--muted2);}
.sum-val{font-size:13px;font-weight:600;font-family:var(--mono);}
.mark-chips{margin-top:8px;}
.chip{display:inline-flex;align-items:center;background:#ef444412;border:1px solid #ef444430;color:#fca5a5;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;margin:2px;}

/* ── BUTTONS ── */
.btn-row{width:calc(100% - 36px);max-width:424px;margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-row.single{grid-template-columns:1fr;}
.main-btn{
  padding:15px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--font);font-size:14px;font-weight:600;
  transition:all 0.2s;letter-spacing:0.2px;
}
.btn-start{background:var(--accent);color:white;box-shadow:0 4px 20px #3b82f630;}
.btn-start:active{transform:scale(0.98);box-shadow:none;}
.btn-stop{background:var(--surface2);border:1px solid var(--border2);color:#fca5a5;}
.btn-stop:active{transform:scale(0.98);}
.btn-summary{background:var(--surface);border:1px solid var(--border2);color:var(--muted2);}
.btn-summary:active{transform:scale(0.98);}
.btn-summary.highlight{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px #3b82f625;}

.err-msg{width:calc(100% - 36px);max-width:424px;margin-top:8px;padding:9px 12px;border-radius:8px;background:#ef444410;border:1px solid #ef444440;color:#fca5a5;font-size:12px;display:none;}
.err-msg.show{display:block;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-svg">
      <svg viewBox="0 0 220 52" width="110" height="26" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lt" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#60a5fa"/>
            <stop offset="50%" style="stop-color:#f1f5f9"/>
            <stop offset="100%" style="stop-color:#38bdf8"/>
          </linearGradient>
          <linearGradient id="lw" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1e3a5f"/>
            <stop offset="45%" style="stop-color:#3b82f6"/>
            <stop offset="100%" style="stop-color:#06b6d4"/>
          </linearGradient>
          <filter id="lg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <text x="110" y="28" font-family="Arial Black,Impact,sans-serif" font-size="30" font-weight="900" text-anchor="middle" letter-spacing="3" fill="url(#lt)" filter="url(#lg)">LIEDAR</text>
        <polyline points="10,38 22,38 27,30 33,44 39,24 45,40 50,34 55,38 62,38 67,34 73,41 79,28 85,42 90,36 95,38 102,38 107,42 113,34 119,38 126,38 131,41 137,34 143,38 148,38 155,42 161,34 167,38 172,38 178,41 184,34 190,38 196,38 210,38"
          fill="none" stroke="url(#lw)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lg)" opacity="0.7"/>
        <circle cx="39" cy="24" r="2" fill="#ef4444" filter="url(#lg)"/>
        <circle cx="79" cy="28" r="1.5" fill="#f59e0b" filter="url(#lg)" opacity="0.8"/>
      </svg>
    </div>
  <div class="topbar-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnHe" onclick="setLang('he')">עב</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btnAr" onclick="setLang('ar')">ع</button>
    </div>
    <div class="status-pill">
      <span class="sdot" id="sdot"></span>
      <span id="statusTxt">STANDBY</span>
    </div>
  </div>
</div>

<!-- SCORE ARC -->
<div class="score-wrap" id="scoreWrap">
  <div class="arc-container">
    <svg id="arcSvg" width="180" height="100" viewBox="0 0 180 100">
      <path id="arcBg" fill="none" stroke="#1c2d42" stroke-width="9" stroke-linecap="round"/>
      <path id="arcFill" fill="none" stroke="#10b981" stroke-width="9" stroke-linecap="round" style="display:none;transition:stroke 0.4s;"/>
      <line id="arcNeedle" x1="90" y1="90" x2="90" y2="28" stroke="#10b981" stroke-width="2" stroke-linecap="round" style="display:none;transform-origin:90px 90px;transition:transform 0.4s,stroke 0.4s;"/>
      <circle id="arcHub" cx="90" cy="90" r="4" fill="#0f1623" stroke="#10b981" stroke-width="2" style="display:none;transition:stroke 0.4s;"/>
    </svg>
    <div class="arc-center">
      <div class="arc-num" id="arcNum">--</div>
      <div class="arc-lbl" id="arcLbl" data-key="waiting">ממתין</div>
    </div>
  </div>
  <div class="calib-tag" id="calibTag" data-key="calibrating">⏳ מכייל...</div>
</div>

<!-- ALERT -->
<div class="alert" id="alertBox">
  <span>⚠️</span><span id="alertTxt"></span>
</div>

<!-- EQ BARS -->
<div class="eq-section">
  <div class="eq-section-title" data-key="eqTitle">ניתוח מאפייני קול בזמן אמת</div>
  <div class="eq-grid">
    <!-- pitch -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-pitch">
        <div class="eq-threshold" style="bottom:70%"></div>
        <div class="eq-bar-fill" id="fill-pitch" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="pitch">גובה<br>קול</div>
      <div class="eq-value" id="val-pitch">--</div>
    </div>
    <!-- jitter -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-jitter">
        <div class="eq-threshold" style="bottom:60%"></div>
        <div class="eq-bar-fill" id="fill-jitter" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="jitter">רעידת<br>קול</div>
      <div class="eq-value" id="val-jitter">--</div>
    </div>
    <!-- pause -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-pause">
        <div class="eq-threshold" style="bottom:55%"></div>
        <div class="eq-bar-fill" id="fill-pause" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="pauses">פאוזות</div>
      <div class="eq-value" id="val-pause">--</div>
    </div>
    <!-- rate -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-rate">
        <div class="eq-threshold" style="bottom:65%"></div>
        <div class="eq-bar-fill" id="fill-rate" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="rate">קצב<br>דיבור</div>
      <div class="eq-value" id="val-rate">--</div>
    </div>
    <!-- volume -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-volume">
        <div class="eq-threshold" style="bottom:75%"></div>
        <div class="eq-bar-fill" id="fill-volume" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="volume">עוצמת<br>קול</div>
      <div class="eq-value" id="val-volume">--</div>
    </div>
    <!-- breath -->
    <div class="eq-col">
      <div class="eq-bar-wrap" id="bar-breath">
        <div class="eq-threshold" style="bottom:60%"></div>
        <div class="eq-bar-fill" id="fill-breath" style="height:3px;background:#10b981;"></div>
      </div>
      <div class="eq-label" data-key="breath">קצב<br>נשימה</div>
      <div class="eq-value" id="val-breath">--</div>
    </div>
  </div>
</div>

<!-- MARK -->
<div class="mark-wrap">
  <button class="mark-btn" id="markBtn" onclick="markMoment()" disabled>
    <span>🚩</span> <span data-key="markBtn">סמן רגע חשוד</span>
    <span class="mark-cnt" id="markCnt">0</span>
  </button>
</div>

<!-- HISTORY -->
<div class="hist-section">
  <div class="sec-header">
    <span class="sec-title" data-key="history">היסטוריה</span>
    <span class="sec-title" id="histDur" style="color:var(--muted)">—</span>
  </div>
  <canvas id="histCanvas"></canvas>
</div>

<!-- SUMMARY PANEL -->
<div class="summary" id="summaryPanel">
  <div class="sum-title" data-key="summaryTitle">סיכום שיחה</div>
  <div class="verdict-box" id="verdictBox">
    <div class="verdict-score" id="verdictScore">--</div>
    <div class="verdict-label" id="verdictLabel">--</div>
    <div class="verdict-desc" id="verdictDesc"></div>
  </div>
  <div class="sum-grid">
    <div class="sum-card"><div class="sum-card-label" data-key="pitch">גובה קול</div><div class="sum-card-val" id="sPitch">--</div><div class="sum-card-note" id="sPitchNote"></div></div>
    <div class="sum-card"><div class="sum-card-label" data-key="jitter">רעידת קול</div><div class="sum-card-val" id="sJitter">--</div><div class="sum-card-note" id="sJitterNote"></div></div>
    <div class="sum-card"><div class="sum-card-label" data-key="pauses">פאוזות</div><div class="sum-card-val" id="sPause">--</div><div class="sum-card-note" id="sPauseNote"></div></div>
    <div class="sum-card"><div class="sum-card-label" data-key="rate">קצב דיבור</div><div class="sum-card-val" id="sRate">--</div><div class="sum-card-note" id="sRateNote"></div></div>
    <div class="sum-card"><div class="sum-card-label" data-key="volume">עוצמת קול</div><div class="sum-card-val" id="sVolume">--</div><div class="sum-card-note" id="sVolumeNote"></div></div>
    <div class="sum-card"><div class="sum-card-label" data-key="breath">קצב נשימה</div><div class="sum-card-val" id="sBreath">--</div><div class="sum-card-note" id="sBreathNote"></div></div>
  </div>
  <div class="sum-row"><span class="sum-key" data-key="sumDurLabel">משך שיחה</span><span class="sum-val" id="sDur">—</span></div>
  <div class="sum-row"><span class="sum-key" data-key="sumMarksLabel">רגעים מסומנים</span><span class="sum-val" id="sMarks">—</span></div>
  <div class="mark-chips" id="markChips"></div>
</div>

<!-- BUTTONS -->
<div class="btn-row" id="btnRow">
  <button class="main-btn btn-start" id="mainBtn" onclick="toggleAnalysis()" data-key="startBtn">התחל ניתוח</button>
  <button class="main-btn btn-summary" id="sumBtn" onclick="toggleSummary()" data-key="summaryBtn" disabled>סיכום</button>
</div>
<div class="err-msg" id="errMsg" data-key="errMsg">לא ניתן לגשת למיקרופון.</div>

<script>
// ── TRANSLATIONS ──
const T = {
  he:{
    waiting:'ממתין', calibrating:'⏳ מכייל...', eqTitle:'ניתוח מאפייני קול בזמן אמת',
    pitch:'גובה קול', jitter:'רעידת קול', pauses:'פאוזות',
    rate:'קצב דיבור', volume:'עוצמת קול', breath:'קצב נשימה',
    markBtn:'סמן רגע חשוד', history:'היסטוריה',
    summaryTitle:'סיכום שיחה', summaryBtn:'סיכום',
    sumDurLabel:'משך שיחה', sumMarksLabel:'רגעים מסומנים',
    startBtn:'התחל ניתוח', stopBtn:'עצור ניתוח',
    errMsg:'לא ניתן לגשת למיקרופון — בדוק הרשאות.',
    noMarks:'אין', waitingData:'ממתין לנתונים...',
    alertDrop:'ירידה חדה באמינות',
    markedAt:(t)=>'🚩 רגע מסומן — '+t,
    credible:'אמין', suspicious:'חשוד', unreliable:'לא אמין',
    credDesc:(s)=> s>65?'הדובר מציג מאפייני קול יציבים ועקביים.': s>38?'זוהו מספר מאפיינים חשודים. מומלץ לשים לב.':'מאפייני קול מרובים מעידים על מתח גבוה.',
    metricNorm:'תקין', metricHigh:'גבוה', metricLow:'נמוך', metricAlert:'חריגה',
    standby:'STANDBY', calib:'CALIBRATING', live:'LIVE',
    expPrefix:'הסבר: ',
    expSep:', ',
    expJitter:'רעידת קול גבוהה',
    expJitterMid:'רעידת קול בינונית',
    expPause:'פאוזות חשודות תכופות באמצע משפט',
    expPauseMid:'פאוזות קצרות באמצע דיבור',

const ACX=90,ACY=90,AR=62;
const ASA=Math.PI*0.85, AEA=Math.PI*2.15, ATA=AEA-ASA;
function apt(a,r){return [ACX+r*Math.cos(a),ACY+r*Math.sin(a)];}
function apath(f,to){
  const lg=(to-f)>Math.PI?1:0;
  const [x1,y1]=apt(f,AR),[x2,y2]=apt(to,AR);
  return 'M'+x1+' '+y1+' A'+AR+' '+AR+' 0 '+lg+' 1 '+x2+' '+y2;
}
document.getElementById('arcBg').setAttribute('d',apath(ASA,AEA));

function credColor(v){return v>65?'#10b981':v>38?'#f59e0b':'#ef4444';}
function credLabel(v){return v>65?t('credible'):v>38?t('suspicious'):t('unreliable');}

function updateArc(v){
  const col=credColor(v);
  document.documentElement.style.setProperty('--cc',col);
  const fr=v/100,ang=ASA+fr*ATA;
  document.getElementById('arcFill').setAttribute('d',apath(ASA,ang));
  document.getElementById('arcFill').setAttribute('stroke',col);
  document.getElementById('arcFill').style.filter='drop-shadow(0 0 5px '+col+'99)';
  document.getElementById('arcFill').style.display='';
  const deg=((ang-(Math.PI*1.5))*(180/Math.PI));
  document.getElementById('arcNeedle').style.transform='rotate('+deg+'deg)';
  document.getElementById('arcNeedle').setAttribute('stroke',col);
  document.getElementById('arcNeedle').style.display='';
  document.getElementById('arcHub').setAttribute('stroke',col);
  document.getElementById('arcHub').style.display='';

  an.textContent=Math.round(v); an.style.color=col; an.classList.add('live');
  al.textContent=credLabel(v); al.style.color=col; al.classList.add('live');
}

// Each bar: value 0-100, threshold, color logic
const BAR_THRESHOLDS = {pitch:70, jitter:60, pause:55, rate:65, volume:75, breath:60};
let alertCooldownBars = {};

function updateBar(name, pct, displayVal){
  const fill=document.getElementById('fill-'+name);
  const valEl=document.getElementById('val-'+name);
  const wrap=document.getElementById('bar-'+name);
  if(!fill) return;

  const thresh=BAR_THRESHOLDS[name]||65;
  let col;
  if(pct>thresh){ col='#ef4444'; }
  else if(pct>thresh*0.75){ col='#f59e0b'; }
  else { col='#10b981'; }

  fill.style.height=Math.max(3,pct)+'%';
  fill.style.background=col;
  fill.style.boxShadow=pct>thresh?'0 0 8px '+col+'88':'none';
  if(valEl) valEl.textContent=displayVal||Math.round(pct)+'%';

  // flash on threshold breach
  if(pct>thresh && !alertCooldownBars[name]){
    alertCooldownBars[name]=true;
    wrap.classList.add('alert-flash');
    setTimeout(()=>{ wrap.classList.remove('alert-flash'); alertCooldownBars[name]=false; },2000);
  }
}

// ── PITCH ──
function detectPitch(buf,sr){
  const S=buf.length,M=Math.floor(S/2);
  let rms=0; for(let i=0;i<S;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/S);
  if(rms<0.01) return 0;
  let bO=-1,bC=0,lC=1;
  for(let o=20;o<M;o++){
    let c=0; for(let i=0;i<M;i++) c+=Math.abs(buf[i]-buf[i+o]);
    c=1-c/M; if(c>0.9&&c>lC){bC=c;bO=o;} lC=c;
  }
  return (bC>0.9&&bO>0)?sr/bO:0;
}

// ── SPEECH RATE TREND TRACKING ──
let rateHistory = [];        // last N speech rate readings
let midSentencePauses = 0;   // pauses detected mid-sentence
let lastVoiceFrame = 0;      // last frame with voice
let shortPauseCount = 0;     // pauses < 800ms (mid-sentence)
let longPauseCount = 0;      // pauses > 1200ms (sentence end - normal)
let inPause = false;
let pauseStartFrame = 0;

// ── CREDIBILITY ──
function computeCred({pitchVar, pauseRatio, speechRate, jitter, volume, midPauseScore, rateTrendScore}){
  // Pitch instability (30%)
  const p = Math.max(0, 100 - pitchVar * 2.5);
  // Jitter (25%)
  const j = Math.max(0, 100 - jitter * 400);
  // Volume instability (15%)
  const v = Math.max(0, 100 - Math.abs(volume - 0.08) * 400);
  // Mid-sentence pause penalty (20%) — only punish short unexpected pauses
  const pa = Math.max(0, 100 - midPauseScore * 3);
  // Speech rate trend (10%) — only punish consistent directional change 3+ times
  const r = Math.max(0, 100 - rateTrendScore * 15);
  return Math.min(100, Math.max(0, p*0.30 + j*0.25 + v*0.15 + pa*0.20 + r*0.10));
}

// ── RATE TREND DETECTOR ──
// Returns penalty score 0-5 based on consistent direction changes
function computeRateTrend(history){
  if(history.length < 4) return 0;
  const recent = history.slice(-6);
  let sameDir = 0;
  let prevDir = 0;
  for(let i=1;i<recent.length;i++){
    const dir = recent[i] > recent[i-1] ? 1 : recent[i] < recent[i-1] ? -1 : 0;
    if(dir !== 0 && dir === prevDir) sameDir++;
    prevDir = dir || prevDir;
  }
  // 3+ consistent changes = suspicious
  return Math.min(5, Math.max(0, sameDir - 2));
}

// ── MID-SENTENCE PAUSE DETECTOR ──
// Returns score 0-20 based on short unexpected pauses
function computeMidPauseScore(shortPauses, longPauses){
  // Long pauses (sentence end) are normal — don't penalise
  // Short pauses mid-sentence are suspicious
  return Math.min(20, shortPauses * 2);
}

// ── HISTORY CHART ──
function drawHistory(){
  const c=document.getElementById('histCanvas'),ctx=c.getContext('2d');
  const w=c.width,h=c.height,pd=8;
  ctx.fillStyle='#0f1623'; ctx.fillRect(0,0,w,h);
  [38,65].forEach(v=>{
    const y=h-pd-(v/100)*(h-pd*2);
    ctx.strokeStyle='#1c2d42';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pd,y);ctx.lineTo(w-pd,y);ctx.stroke();
  });
  ctx.setLineDash([]);
  if(historyData.length<2){
    ctx.fillStyle='#2a4060';ctx.font='11px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText(t('waitingData'),w/2,h/2+4);return;
  }
  marks.forEach(mi=>{
    if(mi>=0&&mi<historyData.length){
      const x=pd+(mi/(historyData.length-1))*(w-pd*2);
      ctx.strokeStyle='#ef444450';ctx.lineWidth=1;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(x,pd);ctx.lineTo(x,h-pd);ctx.stroke();ctx.setLineDash([]);
    }
  });
  historyData.forEach((v,i)=>{
    if(i===0)return;
    const prev=historyData[i-1];
    const x=pd+(i/(historyData.length-1))*(w-pd*2);
    const y=h-pd-(v/100)*(h-pd*2);
    const px=pd+((i-1)/(historyData.length-1))*(w-pd*2);
    const py=h-pd-(prev/100)*(h-pd*2);
    ctx.strokeStyle=credColor(v);ctx.lineWidth=2;ctx.shadowColor=credColor(v);ctx.shadowBlur=2;
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();
  });
  marks.forEach(mi=>{
    if(mi>=0&&mi<historyData.length){
      const x=pd+(mi/(historyData.length-1))*(w-pd*2);
      const y=h-pd-(historyData[mi]/100)*(h-pd*2);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#ef4444';ctx.shadowBlur=0;ctx.fill();
    }
  });
}

  setCard('sPause','sPauseNote',apa,'',apa>8?t('metricAlert'):apa>3?t('metricHigh'):t('metricNorm'));

}

// ── START / STOP ──
async function toggleAnalysis(){ if(active)stopAnalysis(); else await startAnalysis(); }

async function startAnalysis(){
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('summaryPanel').classList.remove('show');
  summaryVisible=false;
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser(); analyser.fftSize=2048;
    src.connect(analyser);
    processor=audioCtx.createScriptProcessor(2048,1,1);
    src.connect(processor); processor.connect(audioCtx.destination);

    pitchHist=[];voiceFrames=0;totalFrames=0;
    lastPitch=0;jitterAcc=0;sampleCount=0;
    credibility=50;prevCred=50;
    historyData=[];marks=[];markTimes=[];markCounter=0;
    alertCooldown=false;alertCooldownBars={};
    sumPitch=[];sumJitter=[];sumPause=[];sumRate=[];sumVolume=[];sumBreath=[];
    rateHistory=[];midSentencePauses=0;shortPauseCount=0;longPauseCount=0;
    inPause=false;pauseStartFrame=0;lastVoiceFrame=0;
    startTime=Date.now();calibrating=true;

    document.getElementById('calibTag').textContent=t('calibrating');
    document.getElementById('calibTag').classList.add('show');
    document.getElementById('sdot').className='sdot calib';
    document.getElementById('statusTxt').textContent=t('calib');
    document.getElementById('markCnt').classList.remove('show');
    document.getElementById('markCnt').textContent='0';
    document.getElementById('sumBtn').disabled=true;

    processor.onaudioprocess=(e)=>{
      const buf=Array.from(e.inputBuffer.getChannelData(0));
      const pitch=detectPitch(buf,audioCtx.sampleRate);
      totalFrames++;

      // RMS volume
      let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/buf.length);

      // breath: low-frequency energy (envelope changes)
      let breathEnergy=0;
      for(let i=1;i<buf.length;i++) breathEnergy+=Math.abs(buf[i]-buf[i-1]);
      breathEnergy/=buf.length;

      if(pitch>80&&pitch<400){
        voiceFrames++; pitchHist.push(pitch);
        if(pitchHist.length>80) pitchHist.shift();
        if(lastPitch>0){jitterAcc+=Math.abs(pitch-lastPitch)/Math.max(pitch,lastPitch);sampleCount++;}
        lastPitch=pitch;
        // Mid-sentence pause detection: was in pause → now voice resumed
        if(inPause){
          const pauseLen = totalFrames - pauseStartFrame;
          // Short pause (< ~15 frames = ~700ms) mid-sentence = suspicious
          if(pauseLen < 15) shortPauseCount++;
          // Long pause (> 25 frames) = natural sentence end = ignore
          else if(pauseLen > 25) longPauseCount++;
          inPause=false;
        }
        lastVoiceFrame=totalFrames;
      } else {
        lastPitch=0;
        // Start tracking pause only if we were just speaking (within 3 frames)
        if(!inPause && totalFrames-lastVoiceFrame <= 3 && lastVoiceFrame>0){
          inPause=true;
          pauseStartFrame=totalFrames;
        }
      }

      if(totalFrames%15===0){
        if(totalFrames<90)return;
        if(calibrating){
          calibrating=false;
          document.getElementById('calibTag').classList.remove('show');
          document.getElementById('sdot').className='sdot live';
          document.getElementById('statusTxt').textContent=t('live');
          document.getElementById('markBtn').disabled=false;
          document.getElementById('sumBtn').disabled=false;
          document.getElementById('sumBtn').classList.add('highlight');
          // Hide arc during live analysis
          document.getElementById('scoreWrap').classList.add('hidden-live');
        }

        const avg=pitchHist.length>0?pitchHist.reduce((a,b)=>a+b,0)/pitchHist.length:0;
        const variance=pitchHist.length>1?Math.sqrt(pitchHist.reduce((a,p)=>a+(p-avg)**2,0)/pitchHist.length):0;
        const speechRate=voiceFrames/(totalFrames/21.5);
        const jitter=sampleCount>0?jitterAcc/sampleCount:0;

        // Track speech rate history for trend detection
        rateHistory.push(speechRate);
        if(rateHistory.length>10) rateHistory.shift();

        const rateTrendScore = computeRateTrend(rateHistory);
        const midPauseScore = computeMidPauseScore(shortPauseCount, longPauseCount);

        // compute bar percentages
        const pitchPct=Math.min(100,Math.max(0,(avg-80)/3.2));
        const jitterPct=Math.min(100,jitter*800);
        const pausePct=Math.min(100,(shortPauseCount/Math.max(1,totalFrames/21.5))*300);
        const ratePct=Math.min(100,rateTrendScore*20);
        const volPct=Math.min(100,rms*500);
        const breathPct=Math.min(100,breathEnergy*2000);

        // update EQ bars
        updateBar('pitch',  pitchPct,  avg>0?Math.round(avg)+' Hz':'--');
        updateBar('jitter', jitterPct, (jitter*100).toFixed(1)+'%');
        updateBar('pause',  pausePct,  shortPauseCount+' '+t('pauses'));
        updateBar('rate',   ratePct,   speechRate.toFixed(1));
        updateBar('volume', volPct,    Math.round(volPct)+'%');
        updateBar('breath', breathPct, Math.round(breathPct)+'%');

        // save for summary
        if(avg>0) sumPitch.push(Math.round(avg));
        sumJitter.push(Math.round(jitterPct));
        sumPause.push(shortPauseCount);
        sumRate.push(Math.round(rateTrendScore*20));
        sumVolume.push(Math.round(volPct));
        sumBreath.push(Math.round(breathPct));

        prevCred=credibility;
        credibility=computeCred({pitchVar:variance,pauseRatio:0,speechRate,jitter,volume:rms,midPauseScore,rateTrendScore});
        // Don't update arc live — only used in summary
        checkAlert(credibility,prevCred);
      }
    };

    histInterval=setInterval(()=>{
      if(!calibrating){historyData.push(credibility);if(historyData.length>60)historyData.shift();drawHistory();}
      callDuration=Math.floor((Date.now()-startTime)/1000);
      document.getElementById('histDur').textContent=formatTime(callDuration);
    },2000);

    durInterval=setInterval(()=>{callDuration=Math.floor((Date.now()-startTime)/1000);},1000);

    active=true;
    document.getElementById('mainBtn').textContent=t('stopBtn');
    document.getElementById('mainBtn').className='main-btn btn-stop';
    resizeCanvases(); drawHistory();

  }catch(err){
    console.error(err);
    document.getElementById('errMsg').textContent=t('errMsg');
    document.getElementById('errMsg').classList.add('show');
  }
}

function stopAnalysis(){
  if(processor){processor.disconnect();processor=null;}
  if(analyser){analyser.disconnect();analyser=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  if(histInterval){clearInterval(histInterval);histInterval=null;}
  if(durInterval){clearInterval(durInterval);durInterval=null;}

  active=false;calibrating=false;
  document.getElementById('calibTag').classList.remove('show');
  document.getElementById('sdot').className='sdot';
  document.getElementById('statusTxt').textContent=t('standby');
  document.getElementById('mainBtn').textContent=t('startBtn');
  document.getElementById('mainBtn').className='main-btn btn-start';
  document.getElementById('markBtn').disabled=true;
  document.getElementById('alertBox').classList.remove('show');
  resetArc();
  document.getElementById('scoreWrap').classList.remove('hidden-live');
  // reset bars
  ['pitch','jitter','pause','rate','volume','breath'].forEach(n=>{
    const f=document.getElementById('fill-'+n);
    if(f){f.style.height='3px';f.style.background='#10b981';}
    const v=document.getElementById('val-'+n); if(v) v.textContent='--';
  });
  // auto show summary
  if(historyData.length>3){
    summaryVisible=true; buildSummary();
    document.getElementById('summaryPanel').classList.add('show');
  }
}

window.addEventListener('load',()=>{ resizeCanvases(); drawHistory(); });
window.addEventListener('resize', resizeCanvases);
</script>
